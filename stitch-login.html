<!DOCTYPE html>

<html lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login - PedAI</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-background": "#191c1e",
                    "tertiary-container": "#0076d2",
                    "on-primary-container": "#fffbff",
                    "on-surface-variant": "#5a4138",
                    "inverse-surface": "#2e3132",
                    "tertiary-fixed-dim": "#a4c9ff",
                    "background": "#f3f4f6",
                    "surface-container-lowest": "#ffffff",
                    "on-error": "#ffffff",
                    "on-primary": "#ffffff",
                    "surface-dim": "#d9dadc",
                    "on-secondary-fixed-variant": "#793110",
                    "inverse-primary": "#ffb599",
                    "surface": "#f8f9fb",
                    "on-primary-fixed-variant": "#7f2b00",
                    "tertiary-fixed": "#d4e3ff",
                    "primary-fixed": "#ffdbce",
                    "surface-container-low": "#f3f4f6",
                    "primary-fixed-dim": "#ffb599",
                    "on-tertiary-fixed-variant": "#004883",
                    "surface-container": "#edeef0",
                    "surface-container-high": "#e7e8ea",
                    "on-secondary": "#ffffff",
                    "secondary-container": "#ff9971",
                    "tertiary": "#005da8",
                    "primary-container": "#cc4900",
                    "outline": "#8e7166",
                    "surface-container-highest": "#e1e2e4",
                    "on-tertiary-fixed": "#001c39",
                    "on-tertiary": "#ffffff",
                    "secondary-fixed-dim": "#ffb599",
                    "secondary": "#974726",
                    "on-surface": "#191c1e",
                    "surface-tint": "#a73a00",
                    "error": "#ba1a1a",
                    "surface-bright": "#f8f9fb",
                    "on-tertiary-container": "#fdfcff",
                    "error-container": "#ffdad6",
                    "on-error-container": "#93000a",
                    "inverse-on-surface": "#f0f1f3",
                    "secondary-fixed": "#ffdbce",
                    "on-primary-fixed": "#370e00",
                    "on-secondary-fixed": "#370e00",
                    "surface-variant": "#e1e2e4",
                    "primary": "#a33900",
                    "outline-variant": "#e2bfb2",
                    "on-secondary-container": "#772f0f"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "fontFamily": {
                    "headline": ["Inter"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen text-on-background">
<div class="w-full max-w-md px-6">
<div class="mb-10 text-center">
<div class="flex justify-center mb-4">
<div class="bg-primary p-3 rounded-full shadow-lg">
<span class="material-symbols-outlined text-white text-3xl" data-icon="restaurant" style="font-variation-settings: 'FILL' 1;">restaurant</span>
</div>
</div>
<h1 class="text-4xl font-black text-primary tracking-tighter">PedAI</h1>
<p class="text-on-surface-variant font-medium mt-2">O maestro da sua cozinha inteligente.</p>
</div>
<div class="bg-surface-container-lowest rounded-full p-8 md:p-12 shadow-[0px_20px_40px_rgba(25,28,30,0.06)] relative overflow-hidden">
<div class="absolute top-0 left-0 w-full h-1.5 bg-gradient-to-r from-primary to-primary-container"></div>
<form class="space-y-6">
<div>
<label class="block text-sm font-semibold text-on-surface-variant mb-2" for="email">E-mail</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-lg" data-icon="mail">mail</span>
<input class="w-full pl-12 pr-4 py-3.5 bg-surface-container-high border-0 border-b-2 border-transparent focus:border-primary focus:ring-0 rounded-xl transition-all duration-200 placeholder:text-outline/60 text-on-surface font-medium" id="email" name="email" placeholder="exemplo@restaurante.com" type="email"/>
</div>
</div>
<div>
<div class="flex justify-between mb-2">
<label class="block text-sm font-semibold text-on-surface-variant" for="password">Senha</label>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-lg" data-icon="lock">lock</span>
<input class="w-full pl-12 pr-4 py-3.5 bg-surface-container-high border-0 border-b-2 border-transparent focus:border-primary focus:ring-0 rounded-xl transition-all duration-200 placeholder:text-outline/60 text-on-surface font-medium" id="password" name="password" placeholder="••••••••" type="password"/>
</div>
</div>
<div class="flex items-center justify-between">
<div class="flex items-center">
<input class="h-4 w-4 rounded border-outline-variant text-primary focus:ring-primary" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-2 block text-xs font-medium text-on-surface-variant" for="remember-me">Lembrar de mim</label>
</div>
<a class="text-xs font-bold text-primary hover:text-primary-container transition-colors" href="#">Esqueci minha senha</a>
</div>
<button class="w-full py-4 px-6 bg-gradient-to-br from-primary to-primary-container text-white font-bold rounded-full shadow-md hover:scale-[1.02] active:scale-[0.98] transition-all flex items-center justify-center gap-2 group" type="submit">
<span>Entrar</span>
<span class="material-symbols-outlined text-xl group-hover:translate-x-1 transition-transform" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<div class="mt-8 pt-8 border-t border-outline-variant/10 text-center">
<p class="text-sm text-on-surface-variant">
                    Ainda não tem uma conta? 
                    <a class="text-primary font-bold hover:underline" href="#">Solicite acesso</a>
</p>
</div>
</div>
<div class="mt-12 grid grid-cols-2 gap-4">
<div class="bg-surface-container-low p-4 rounded-xl flex items-center gap-3">
<div class="h-10 w-10 rounded-full bg-surface-container-high flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-xl" data-icon="speed" style="font-variation-settings: 'FILL' 1;">speed</span>
</div>
<div>
<p class="text-[10px] font-bold text-on-surface-variant uppercase tracking-wider">Performance</p>
<p class="text-xs font-semibold text-on-surface">Operação Ágil</p>
</div>
</div>
<div class="bg-surface-container-low p-4 rounded-xl flex items-center gap-3">
<div class="h-10 w-10 rounded-full bg-surface-container-high flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-xl" data-icon="auto_awesome" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
</div>
<div>
<p class="text-[10px] font-bold text-on-surface-variant uppercase tracking-wider">IA Integrada</p>
<p class="text-xs font-semibold text-on-surface">Gestão Inteligente</p>
</div>
</div>
</div>
<footer class="mt-16 text-center">
<p class="text-xs text-outline font-medium">© 2024 PedAI Culinary Systems. Todos os direitos reservados.</p>
</footer>
</div>
</body></html>
